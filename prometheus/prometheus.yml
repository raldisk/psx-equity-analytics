global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "psx-analytics-api"
    static_configs:
      - targets: ["psx_api:8000"]
    metrics_path: /metrics

  - job_name: "duckdb-exporter"
    static_configs:
      - targets: ["localhost:9101"]
    scrape_interval: 60s
